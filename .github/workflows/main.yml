name: RDP_TIPSUNIX with State Persistence

on:
  workflow_dispatch:

permissions:
  contents: write
  actions: write

jobs:
  secure-rdp:
    runs-on: windows-latest
    timeout-minutes: 3600

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          persist-credentials: true
          fetch-depth: 0

      # === RESTORE STATE FROM REPOSITORY ===
      - name: Prepare Tailscale directory
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Path "C:\ProgramData\Tailscale" -Force | Out-Null
          Write-Host "Tailscale directory prepared"
      
      - name: Restore Tailscale state from repository
        shell: pwsh
        run: |
          if (Test-Path ".github\state\server-state.conf") {
              Copy-Item ".github\state\server-state.conf" -Destination "C:\ProgramData\Tailscale\server-state.conf"
              Write-Host "Tailscale state restored from repository"
          } else {
              Write-Host "No previous state found"
          }

      # === RDP CONFIG ===
      - name: Configure Core RDP Settings
        run: |
          Set-ItemProperty -Path 'HKLM:\System\CurrentControlSet\Control\Terminal Server' `
                             -Name "fDenyTSConnections" -Value 0 -Force

          Set-ItemProperty -Path 'HKLM:\System\CurrentControlSet\Control\Terminal Server\WinStations\RDP-Tcp' `
                             -Name "UserAuthentication" -Value 0 -Force

          Set-ItemProperty -Path 'HKLM:\System\CurrentControlSet\Control\Terminal Server\WinStations\RDP-Tcp' `
                             -Name "SecurityLayer" -Value 0 -Force

          netsh advfirewall firewall delete rule name="RDP-Tailscale"

          netsh advfirewall firewall add rule name="RDP-Tailscale" `
            dir=in action=allow protocol=TCP localport=3389

          Restart-Service -Name TermService -Force

      # === CREATE USER SOME_ONE ===
      - name: Create / Update RDP User (SOME_ONE)
        shell: pwsh
        run: |
          $username = "SOME_ONE"
          $password = "${{ secrets.RDP_PASSWORD }}"

          if ([string]::IsNullOrWhiteSpace($password)) {
            Write-Error "RDP_PASSWORD secret is empty"
            exit 1
          }

          $securePass = ConvertTo-SecureString $password -AsPlainText -Force

          if (Get-LocalUser -Name $username -ErrorAction SilentlyContinue) {
              Write-Host "User exists, updating password"
              Set-LocalUser -Name $username -Password $securePass
          } else {
              Write-Host "Creating user SOME_ONE"
              New-LocalUser -Name $username -Password $securePass -AccountNeverExpires
              
              Add-LocalGroupMember -Group "Administrators" -Member $username
              Add-LocalGroupMember -Group "Remote Desktop Users" -Member $username
          }

          # Ensure profile directory exists
          $userPath = "C:\Users\$username"
          if (!(Test-Path $userPath)) {
              Write-Host "Creating user folder $userPath"
              New-Item -ItemType Directory -Path $userPath -Force | Out-Null
          }

          echo "RDP_USER=$username" >> $env:GITHUB_ENV

      # === INSTALL TAILSCALE ===
      - name: Install Tailscale
        run: |
          $tsUrl = "https://pkgs.tailscale.com/stable/tailscale-setup-1.82.0-amd64.msi"
          $installerPath = "$env:TEMP\tailscale.msi"
          
          Invoke-WebRequest -Uri $tsUrl -OutFile $installerPath
          Start-Process msiexec.exe -ArgumentList "/i", "`"$installerPath`"", "/quiet", "/norestart" -Wait
          Remove-Item $installerPath -Force

      # === CONNECT TAILSCALE ===
      - name: Establish Tailscale Connection
        run: |
          & "$env:ProgramFiles\Tailscale\tailscale.exe" up `
            --authkey=${{ secrets.TAILSCALE_AUTH_KEY }} `
            --hostname=gh-runner-$env:GITHUB_RUN_ID
          
          $tsIP = $null
          $retries = 0

          while (-not $tsIP -and $retries -lt 10) {
              $tsIP = & "$env:ProgramFiles\Tailscale\tailscale.exe" ip -4
              Start-Sleep -Seconds 5
              $retries++
          }
          
          if (-not $tsIP) {
              Write-Error "No Tailscale IP"
              exit 1
          }

          echo "TAILSCALE_IP=$tsIP" >> $env:GITHUB_ENV

      # === VERIFY RDP ===
      - name: Verify RDP Accessibility
        run: |
          Write-Host "IP: $env:TAILSCALE_IP"
          
          $testResult = Test-NetConnection -ComputerName $env:TAILSCALE_IP -Port 3389

          if (-not $testResult.TcpTestSucceeded) {
              Write-Error "RDP failed"
              exit 1
          }

          Write-Host "RDP OK"

      # === KEEP SESSION ===
      - name: Maintain Connection
        run: |
          Write-Host "`n=== RDP ACCESS ==="
          Write-Host "Address : $env:TAILSCALE_IP"
          Write-Host "Username: SOME_ONE"
          Write-Host "Password: (secret)"
          Write-Host "==================`n"
          
          $startTime = Get-Date
          $durationMinutes = 330

          while ((Get-Date) -lt $startTime.AddMinutes($durationMinutes)) {
              Start-Sleep -Seconds 300
              Write-Host "RDP still alive..."
          }

      # === SAVE STATE ===
      - name: Save Tailscale state
        if: always()
        shell: pwsh
        run: |
          if (Test-Path "C:\ProgramData\Tailscale\server-state.conf") {
              New-Item -ItemType Directory -Path ".github\state" -Force | Out-Null
              Copy-Item "C:\ProgramData\Tailscale\server-state.conf" ".github\state\server-state.conf" -Force
          }

      - name: Commit state
        if: always()
        shell: pwsh
        run: |
          git config --global user.email "actions@github.com"
          git config --global user.name "GitHub Actions"

          git pull origin main --no-edit || true
          git add .github/state/

          $status = git status --porcelain .github/state/
          if ($status) {
              git commit -m "Save state"
              git push
          }

      # === AUTO RE-RUN ===
      - name: Trigger next run
        if: always()
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: pwsh
        run: |
          gh workflow run "${{ github.workflow }}" --ref ${{ github.ref_name }}
