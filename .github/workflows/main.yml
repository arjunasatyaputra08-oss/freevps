name: RDP_TIPSUNIX with State Persistence

on:
  workflow_dispatch:

# Grant write permissions to workflow
permissions:
  contents: write
  actions: write

jobs:
  secure-rdp:
    runs-on: windows-latest
    timeout-minutes: 3600

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          persist-credentials: true
          fetch-depth: 0  # Fetch all history to get previous state

      # === RESTORE STATE FROM REPOSITORY ===
      - name: Prepare Tailscale directory
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Path "C:\ProgramData\Tailscale" -Force | Out-Null
          Write-Host "Tailscale directory prepared"
      
      - name: Restore Tailscale state from repository
        shell: pwsh
        run: |
          if (Test-Path ".github\state\server-state.conf") {
              Copy-Item ".github\state\server-state.conf" -Destination "C:\ProgramData\Tailscale\server-state.conf"
              Write-Host "Tailscale state restored from repository"
          } else {
              Write-Host "No previous state found (this is normal for first run)"
          }

      - name: Configure Core RDP Settings
        run: |
          # Enable Remote Desktop and disable Network Level Authentication (if needed)
          Set-ItemProperty -Path 'HKLM:\System\CurrentControlSet\Control\Terminal Server' `
                             -Name "fDenyTSConnections" -Value 0 -Force
          Set-ItemProperty -Path 'HKLM:\System\CurrentControlSet\Control\Terminal Server\WinStations\RDP-Tcp' `
                             -Name "UserAuthentication" -Value 0 -Force
          Set-ItemProperty -Path 'HKLM:\System\CurrentControlSet\Control\Terminal Server\WinStations\RDP-Tcp' `
                             -Name "SecurityLayer" -Value 0 -Force

          # Remove any existing rule with the same name to avoid duplication
          netsh advfirewall firewall delete rule name="RDP-Tailscale"
          
          # For testing, allow any incoming connection on port 3389
          netsh advfirewall firewall add rule name="RDP-Tailscale" `
            dir=in action=allow protocol=TCP localport=3389

          # (Optional) Restart the Remote Desktop service to ensure changes take effect
          Restart-Service -Name TermService -Force

      - name: Create / Update RDP User (Password from Secret)
        shell: pwsh
        run: |
          $username = "SOME_ONE"
          $password = "${{ secrets.RDP_PASSWORD }}"

          if ([string]::IsNullOrWhiteSpace($password)) {
            Write-Error "RDP_PASSWORD secret is not set or empty"
            exit 1
          }

          $securePass = ConvertTo-SecureString $password -AsPlainText -Force

          if (Get-LocalUser -Name $username -ErrorAction SilentlyContinue) {
              Write-Host "User $username already exists, updating password"
              Set-LocalUser -Name $username -Password $securePass
          } else {
              Write-Host "Creating user $username"
              New-LocalUser -Name $username -Password $securePass -AccountNeverExpires
              Add-LocalGroupMember -Group "Administrators" -Member $username
              Add-LocalGroupMember -Group "Remote Desktop Users" -Member $username
          }

          echo "RDP_USER=$username" >> $env:GITHUB_ENV

      - name: Install Tailscale
        run: |
          $tsUrl = "https://pkgs.tailscale.com/stable/tailscale-setup-1.82.0-amd64.msi"
          $installerPath = "$env:TEMP\tailscale.msi"
          
          Invoke-WebRequest -Uri $tsUrl -OutFile $installerPath
          Start-Process msiexec.exe -ArgumentList "/i", "`"$installerPath`"", "/quiet", "/norestart" -Wait
          Remove-Item $installerPath -Force

      - name: Establish Tailscale Connection
        run: |
          # Bring up Tailscale with the provided auth key and set a unique hostname
          & "$env:ProgramFiles\Tailscale\tailscale.exe" up --authkey=${{ secrets.TAILSCALE_AUTH_KEY }} --hostname=gh-runner-$env:GITHUB_RUN_ID
          
          # Wait for Tailscale to assign an IP
          $tsIP = $null
          $retries = 0
          while (-not $tsIP -and $retries -lt 10) {
              $tsIP = & "$env:ProgramFiles\Tailscale\tailscale.exe" ip -4
              Start-Sleep -Seconds 5
              $retries++
          }
          
          if (-not $tsIP) {
              Write-Error "Tailscale IP not assigned. Exiting."
              exit 1
          }
          echo "TAILSCALE_IP=$tsIP" >> $env:GITHUB_ENV
      
      - name: Verify RDP Accessibility
        run: |
          Write-Host "Tailscale IP: $env:TAILSCALE_IP"
          
          # Test connectivity using Test-NetConnection against the Tailscale IP on port 3389
          $testResult = Test-NetConnection -ComputerName $env:TAILSCALE_IP -Port 3389
          if (-not $testResult.TcpTestSucceeded) {
              Write-Error "TCP connection to RDP port 3389 failed"
              exit 1
          }
          Write-Host "TCP connectivity successful!"

      - name: Setup Environment and Download WebPilot
        shell: pwsh
        run: |
          pip install gdown
      
          Write-Host "Downloading WebPilot ZIP..."
          New-Item -ItemType Directory -Path "C:\ProjectTemp" -Force | Out-Null
          Set-Location -Path "C:\ProjectTemp"
      
          # Download file
          gdown "https://drive.google.com/uc?id=158HUKE1CVDKlZZdrkD3UFvzsQyCp0CQU" -O webpilot.zip
      
          if (!(Test-Path "webpilot.zip")) {
              Write-Error "Download failed! webpilot.zip not found."
              exit 1
          }
      
          $size = (Get-Item webpilot.zip).Length
          Write-Host "Downloaded size: $size bytes"

          # === EXTRACT ZIP ===
          Write-Host "Extracting WebPilot ZIP..."
          Expand-Archive -Path "webpilot.zip" -DestinationPath "C:\ProjectTemp\extracted" -Force

          # === DETECT FOLDER RESULT ===
          $extractedFolder = Get-ChildItem -Path "C:\ProjectTemp\extracted" | Select-Object -First 1

          if ($extractedFolder) {
              Write-Host "Moving project to correct directory..."

              New-Item -ItemType Directory -Path "C:\Users\runneradmin\webpilot" -Force | Out-Null

              Copy-Item -Path "$($extractedFolder.FullName)\*" `
                        -Destination "C:\Users\runneradmin\webpilot" `
                        -Recurse -Force
          } else {
              Write-Error "Extraction failed or empty!"
              exit 1
          }

          # === VALIDASI FINAL ===
          if (!(Test-Path "C:\Users\runneradmin\webpilot\webpilot.py")) {
              Write-Warning "webpilot.py not found, structure may be incorrect"
          } else {
              Write-Host "WebPilot successfully placed!"
          }

          # === INSTALL DEPENDENCIES ===
          Set-Location -Path "C:\Users\runneradmin\webpilot"

          if (Test-Path "requirements.txt") {
              pip install -r requirements.txt
          } else {
              Write-Warning "requirements.txt not found."
          }
          
      - name: Run YouTube Studio Monitor
        shell: pwsh
        working-directory: C:\Users\runneradmin\webpilot
        run: |
          Write-Host "Menyediakan akses cepat di Desktop SOME_ONE..."
          if (Test-Path "C:\Users\SOME_ONE\Desktop") {
              $WshShell = New-Object -comObject WScript.Shell
              $Shortcut = $WshShell.CreateShortcut("C:\Users\SOME_ONE\Desktop\Folder_Otomatisasi_Webpilot.lnk")
              $Shortcut.TargetPath = "C:\Users\runneradmin\webpilot"
              $Shortcut.Save()
          }

          Write-Host "Starting YouTube Studio Monitor in background..."
          Start-Process python -ArgumentList @(
              "webpilot.py",
              "--session", "youtube",
              "run",
              "scripts/yt_studio_monitor.py"
          ) -NoNewWindow -RedirectStandardOutput yt_monitor.log -RedirectStandardError yt_monitor_error.log
          Write-Host "YouTube Studio Monitor is running. Logs are saved to yt_monitor.log"

      - name: Debug Screenshot After Monitor Start
        shell: pwsh
        working-directory: C:\Users\runneradmin\webpilot
        run: |
          Write-Host "Menunggu 20 detik agar monitor sempat load halaman YouTube Studio..."
          Start-Sleep -Seconds 20

          Write-Host "Mengambil screenshot debug langsung dari browser..."
          python -c @"
          import json, time, sys
          from playwright.sync_api import sync_playwright

          p = sync_playwright().start()
          browser = p.chromium.launch(headless=True, channel='chrome', args=['--disable-blink-features=AutomationControlled'])

          ctx_opts = {'viewport': {'width': 1280, 'height': 720}, 'locale': 'en-US'}
          try:
              with open('sessions/youtube.json', 'r', encoding='utf-8') as f:
                  ctx_opts['storage_state'] = json.load(f)
              print('Session youtube.json dimuat.', file=sys.stderr)
          except Exception as e:
              print(f'PERINGATAN: Gagal memuat session: {e}', file=sys.stderr)

          context = browser.new_context(**ctx_opts)
          pg = context.new_page()
          pg.goto('https://studio.youtube.com/channel/UCJtqdt9wlsdffx3Oh1QiXEw', wait_until='networkidle', timeout=60000)
          time.sleep(5)
          pg.screenshot(path='debug_screenshot.png', full_page=True)
          print('Screenshot disimpan: debug_screenshot.png', file=sys.stderr)

          # Ambil judul halaman untuk debugging
          title = pg.title()
          url = pg.url
          print(f'Halaman: {title}', file=sys.stderr)
          print(f'URL: {url}', file=sys.stderr)

          context.close()
          browser.close()
          p.stop()
          "@

          if (Test-Path "debug_screenshot.png") {
              $size = (Get-Item "debug_screenshot.png").Length
              Write-Host "Screenshot berhasil! File: C:\Users\runneradmin\webpilot\debug_screenshot.png ($size bytes)"
          } else {
              Write-Host "Screenshot gagal dibuat."
          }

          # Tampilkan log monitor untuk debugging
          Write-Host "`n=== Monitor STDERR Log (last 50 lines) ==="
          if (Test-Path "yt_monitor_error.log") {
              Get-Content "yt_monitor_error.log" -Tail 50
          } else {
              Write-Host "(file belum ada)"
          }
          Write-Host "`n=== Monitor STDOUT Log (last 30 lines) ==="
          if (Test-Path "yt_monitor.log") {
              Get-Content "yt_monitor.log" -Tail 30
          } else {
              Write-Host "(file belum ada)"
          }

      - name: Maintain Connection
        run: |
          Write-Host "`n=== RDP ACCESS ==="
          Write-Host "http://www.youtube.com/@TipsUNIX"
          Write-Host "Address: $env:TAILSCALE_IP"
          Write-Host "Username: SOME_ONE"
          Write-Host "Password: (stored securely in secret)"
          Write-Host "==================`n"
          
          # Keep runner active for a limited time (e.g., 5.5 hours) before auto-restarting
          $startTime = Get-Date
          $durationMinutes = 330
          Write-Host "Target duration: $durationMinutes minutes"
          
          while ((Get-Date) -lt $startTime.AddMinutes($durationMinutes)) {
              $elapsed = (Get-Date) - $startTime
              $remaining = $startTime.AddMinutes($durationMinutes) - (Get-Date)
              Write-Host "[$(Get-Date)] RDP Active - Elapsed: $([Math]::Round($elapsed.TotalMinutes)) min | Remaining: $([Math]::Round($remaining.TotalMinutes)) min"
              Start-Sleep -Seconds 300
          }
          Write-Host "Reaching time limit. Preparing to restart..."

      # === SAVE STATE TO REPOSITORY ===
      - name: Save Tailscale state to repository
        if: always()
        shell: pwsh
        run: |
          if (Test-Path "C:\ProgramData\Tailscale\server-state.conf") {
              # Prepare state directory
              New-Item -ItemType Directory -Path ".github\state" -Force | Out-Null
              
              # Copy state file
              Copy-Item "C:\ProgramData\Tailscale\server-state.conf" -Destination ".github\state\server-state.conf" -Force
              
              Write-Host "State file copied to repository"
          } else {
              Write-Host "No state file to save"
          }
      
      - name: Commit and push state
        if: always()
        shell: pwsh
        run: |
          git config --global user.email "actions@github.com"
          git config --global user.name "GitHub Actions"
          
          # Pull latest changes first to avoid conflicts
          git pull origin main --no-edit || true
          
          git add .github/state/
          
          # Check if there are changes to commit
          $status = git status --porcelain .github/state/
          if ($status) {
              git commit -m "Save Tailscale state [skip ci]"
              git push
              Write-Host "State committed to repository"
          } else {
              Write-Host "No changes to commit"
          }

      - name: Trigger next workflow run
        if: always()
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: pwsh
        run: |
          Write-Host "Triggering next workflow: ${{ github.workflow }} on branch: ${{ github.ref_name }}"
          gh workflow run "${{ github.workflow }}" --ref ${{ github.ref_name }}
          if ($LASTEXITCODE -eq 0) {
              Write-Host "Next workflow triggered successfully"
          } else {
              Write-Host "Failed to trigger next workflow"
          }
